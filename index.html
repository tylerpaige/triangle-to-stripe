<!doctype html>
<html>

<head>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
    }

    html {
      -moz-text-size-adjust: none;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
    }

    body {
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
    }

    input,
    button,
    textarea,
    select {
      font: inherit;
    }

    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      overflow-wrap: break-word;
    }
  </style>
  <style>
    body {
      overflow-x: hidden;
      background-color: #111;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
      height: 100vh;
      flex-shrink: 0;
    }

    .stack-layer {
      flex-shrink: 0;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    .hypotenuse-label {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      transform: translate(-50%, calc(-100% - 0.5em)) rotate(var(--hypo-angle, 0deg));
      transform-origin: center center;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      font-size: 3rem;
    }

    .triangle-scale-wrap {
      position: absolute;
      left: 0;
      width: 100%;
      will-change: transform;
    }

    .triangle-scale-wrap--origin-top {
      top: 0;
      transform-origin: top center;
    }

    .triangle-scale-wrap--origin-bottom {
      bottom: 0;
      transform-origin: bottom center;
    }

    .triangles-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
  </style>
</head>

<body>
  <section class="triangles-section" id="triangles-section">
    <div id="stage" class="stage"></div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script type="text/javascript">
    /*
    *******************
    ** CONFIGURATION **
    *******************
    */
    /** triangleColor: triangle fill, backgroundColor: strip background, textColor: hypotenuse label */
    const COLOR_COMBINATIONS = [
      { triangleColor: 'tomato', backgroundColor: 'cornflowerblue', textColor: 'ivory' },
      { triangleColor: 'tomato', backgroundColor: 'skyblue', textColor: 'midnightblue' },
      { triangleColor: 'burlywood', backgroundColor: 'skyblue', textColor: 'saddlebrown' },
      { triangleColor: 'burlywood', backgroundColor: 'yellowgreen', textColor: 'darkgreen' },
      { triangleColor: 'orange', backgroundColor: 'yellowgreen', textColor: 'brown' },
      { triangleColor: 'orange', backgroundColor: 'cornflowerblue', textColor: 'ivory' },
    ];
    /** How many consecutive triangles (in chronological order, oldest first) share one
     * color set before advancing to the next in COLOR_COMBINATIONS. Use 2 for every
     * other triangle switching sets, 3 for every third, etc. */
    const COLOR_SET_TRIANGLE_CADENCE = 1;
    /** Minimum height of a triangle in vh, as they shrink down to make room for others */
    const MIN_VH = 0.5;
    /** Hypotenuse label opacity goes 1→0 across this fraction of the span above MIN_VH (bottom of range = min height). */
    const LABEL_FADE_ZONE_FRAC = 0.05;
    /** vh grown per millisecond of virtual time (used only to build the scroll timeline) */
    const VH_PER_MS = 100 / 100;
    /** Max keyframes for scroll scrub (higher = smoother, more build time). */
    const SCROLL_KEYFRAME_CAP = 4000;
    /** Pixels of scroll while the triangles section is pinned (animation maps 0→1). */
    const SCROLL_ANIMATION_DISTANCE_PX = 4500;
    /**
     * While pressing and holding the triangles section, progress changes at this rate
     * (0–1 of the full animation per second). Lower half of the viewport scrubs forward;
     * upper half scrubs backward. Set to 0 to disable.
     */
    const AUTO_HOLD_PROGRESS_PER_SECOND = 0.1;
    /** Wait this long after press before auto-advance starts (avoids fighting scroll gestures). */
    const AUTO_HOLD_DELAY_MS = 350;
    /** If the pointer moves farther than this before hold kicks in, cancel (user is scrolling). */
    const AUTO_HOLD_MOVE_CANCEL_PX = 14;
    /**
     * Double-tap skip magnitude (0.1 = 10% of the animation). Sign follows viewport half:
     * lower half skips forward, upper half skips backward.
     */
    const DOUBLE_TAP_SKIP_FRAC = 0.1;
    /** Max ms between the two taps’ pointerup for a double-tap. */
    const DOUBLE_TAP_MAX_INTERVAL_MS = 320;
    /** Max px between tap locations (second pointerup vs first pointerup). */
    const DOUBLE_TAP_MAX_DISTANCE_PX = 45;
    /** Seconds to tween the double-tap skip (smoothly animates that progress delta). */
    const DOUBLE_TAP_ANIM_DURATION_SEC = 1;
    /**
     * Lines shown along each triangle’s hypotenuse, in chronological order (oldest
     * triangle first). If there are fewer entries than triangles, the list repeats.
     */
    const SCRIPT = [
      'First light',
      'Second wind',
      'Third wave',
      'Fourth told',
      'Fifth element',
      'Sixth hour',
      'Seventh season',
      'Eighth attempt',
    ];

    /*
    ***************
    ** CONSTANTS **
    ***************
    */
    const VALID_RIGHT_ANGLE_LOCATIONS = ['top-right', 'top-left', 'bottom-right', 'bottom-left'];
    const TRIANGLE_TARGET = 100 / MIN_VH;

    /*
    ***************
    ** FUNCTIONS **
    ***************
    */

    const getTriangle = ({ width, height, rightAngleLocation = 'top-right', color = 'black' }) => {
      if (!VALID_RIGHT_ANGLE_LOCATIONS.includes(rightAngleLocation)) {
        throw new Error(`Invalid right angle location: ${rightAngleLocation}`);
      }

      switch (rightAngleLocation) {
        case 'top-right':
          return `<div data-right-angle-location="top-right" style="border-top: 0 solid transparent; border-bottom: ${height} solid transparent; border-right: ${width} solid ${color};"></div>`;
        case 'top-left':
          return `<div data-right-angle-location="top-left" style="border-top: 0 solid transparent; border-bottom: ${height} solid transparent; border-left: ${width} solid ${color};"></div>`;
        case 'bottom-right':
          return `<div data-right-angle-location="bottom-right" style="border-top: ${height} solid transparent; border-bottom: 0 solid transparent; border-right: ${width} solid ${color};"></div>`;
        case 'bottom-left':
          return `<div data-right-angle-location="bottom-left" style="border-top: ${height} solid transparent; border-bottom: 0 solid transparent; border-left: ${width} solid ${color};"></div>`;
        default:
          throw new Error(`Invalid right angle location: ${rightAngleLocation}`);
      }
    }

    /**
     * Heights in vh, top-first: index 0 is the newest / growing triangle.
     * Sum is always 100. Each layer below the top may shrink down to MIN_VH, so the
     * top can grow at most 100 - (n-1)*MIN_VH when n >= 2.
     */
    const maxTopVh = (heights) => {
      const n = heights.length;
      if (n <= 1) return 100;
      return 100 - (n - 1) * MIN_VH;
    };

    const growTop = (heights, dh) => {
      if (heights.length <= 1 || dh <= 0) return heights;
      const out = heights.slice();
      let remaining = dh;
      out[0] += dh;
      for (let i = out.length - 1; i >= 1 && remaining > 1e-9; i--) {
        const take = Math.min(remaining, Math.max(0, out[i] - MIN_VH));
        out[i] -= take;
        remaining -= take;
      }
      if (remaining > 1e-9) {
        out[0] -= remaining;
      }
      return out;
    };

    const maybeAddTriangle = (heights) => {
      if (heights.length >= TRIANGLE_TARGET) return heights;
      const cap = maxTopVh(heights);
      if (heights[0] < cap - 1e-6) return heights;
      return [0, ...heights];
    };

    /**
     * One virtual-time step (same rules as the former rAF loop).
     * @param {number[]} heights
     * @param {number} dt ms
     */
    const stepHeights = (heights, dt) => {
      if (heights.length === 1) {
        let h = [Math.min(100, heights[0] + VH_PER_MS * dt)];
        if (h[0] >= 100 - 1e-6) {
          h = maybeAddTriangle(h);
        }
        return h;
      }
      let h = heights;
      const cap = maxTopVh(h);
      const room = cap - h[0];
      if (room > 1e-9) {
        const step = Math.min(room, VH_PER_MS * dt);
        h = growTop(h, step);
      }
      if (h[0] >= maxTopVh(h) - 1e-6 && h.length < TRIANGLE_TARGET) {
        h = maybeAddTriangle(h);
      }
      return h;
    };

    const simulationComplete = (heights) => {
      const cap = maxTopVh(heights);
      return (
        heights.length >= TRIANGLE_TARGET &&
        heights[0] >= cap - 1e-3 &&
        heights.slice(1).every((x) => Math.abs(x - MIN_VH) < 1e-2)
      );
    };

    /**
     * Run the full simulation with fixed dt; return total virtual ms and subsampled keyframes.
     */
    const buildScrollKeyframes = () => {
      const dt = 1;
      let h = [100];
      let t = 0;
      let guard = 0;
      const maxGuard = 50_000_000;
      while (!simulationComplete(h) && guard < maxGuard) {
        h = stepHeights(h, dt);
        t += dt;
        guard++;
      }
      const totalVirtualMs = t;

      const interval = Math.max(dt, totalVirtualMs / SCROLL_KEYFRAME_CAP);
      h = [100];
      t = 0;
      const keyframes = [{ t: 0, heights: [100] }];
      let nextSample = interval;
      guard = 0;
      while (!simulationComplete(h) && guard < maxGuard) {
        h = stepHeights(h, dt);
        t += dt;
        guard++;
        if (t >= nextSample - 1e-9) {
          keyframes.push({ t, heights: h.slice() });
          nextSample += interval;
        }
      }
      const last = keyframes[keyframes.length - 1];
      if (!last || last.t < totalVirtualMs - 1e-6 || last.heights.length !== h.length) {
        keyframes.push({ t: totalVirtualMs, heights: h.slice() });
      }

      refreshKeyframeLabelAngles(keyframes);

      return { keyframes, totalVirtualMs };
    };

    const heightsAtProgress = (keyframes, p) => {
      if (keyframes.length === 0) return [0];
      const clamped = Math.max(0, Math.min(1, p));
      const idx = Math.round(clamped * (keyframes.length - 1));
      return keyframes[idx].heights.slice();
    };

    const colorSetIndexForTriangle = (chronologicalIndex) =>
      Math.floor(chronologicalIndex / COLOR_SET_TRIANGLE_CADENCE) % COLOR_COMBINATIONS.length;

    const escapeHtml = (s) =>
      String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    const rightAngleLocationForChronologicalIndex = (chronologicalIndex) => {
      switch (chronologicalIndex % 4) {
        case 0:
          return 'top-right';
        case 1:
          return 'bottom-right';
        case 2:
          return 'top-left';
        case 3:
          return 'bottom-left';
        default:
          return 'top-right';
      }
    };

    /**
     * Degrees to rotate a horizontal baseline so it matches the hypotenuse.
     * Legs in px: horizontal = W (100vw), vertical = H (layer height).
     */
    const hypotenuseLabelAngleDeg = (rightAngleLocation, W, H) => {
      const toDeg = (r) => (r * 180) / Math.PI;
      let deg;
      switch (rightAngleLocation) {
        case 'top-right':
          deg = toDeg(Math.atan2(H, W));
          break;
        case 'bottom-right':
          deg = toDeg(Math.atan2(-H, W));
          break;
        case 'top-left':
          deg = toDeg(Math.atan2(H, -W)) + 180;
          break;
        case 'bottom-left':
          deg = toDeg(Math.atan2(H, W));
          break;
        default:
          deg = 0;
      }
      return deg;
    };

    /** Per-layer label angles (deg) for a height snapshot; uses W/H in px. */
    const labelAnglesDegForHeights = (heights, W, H) => {
      const n = heights.length;
      return heights.map((hv, i) => {
        const chronologicalIndex = n - 1 - i;
        const loc = rightAngleLocationForChronologicalIndex(chronologicalIndex);
        const layerH = (Math.max(0, hv) / 100) * H;
        return hypotenuseLabelAngleDeg(loc, W, layerH);
      });
    };

    /** Recompute `labelAnglesDeg` on every keyframe (call on resize; angles depend on aspect ratio). */
    const refreshKeyframeLabelAngles = (keyframes) => {
      const iw = window.innerWidth;
      const ih = window.innerHeight;
      for (const kf of keyframes) {
        kf.labelAnglesDeg = labelAnglesDegForHeights(kf.heights, iw, ih);
      }
    };

    const scriptLineForTriangle = (chronologicalIndex) => {
      if (!SCRIPT.length) return '';
      return SCRIPT[chronologicalIndex % SCRIPT.length];
    };

    /**
     * Map previous stack height to layer index i when stack length may have changed.
     * Top is index 0; when a new triangle is prepended, former layers shift down by one.
     */
    const prevHeightForLayer = (heights, prevHeights, i) => {
      const hv = Math.max(0, heights[i]);
      if (!prevHeights || prevHeights.length === 0) return hv;
      const n = heights.length;
      const nPrev = prevHeights.length;
      if (nPrev === n) return Math.max(0, prevHeights[i]);
      if (n === nPrev + 1) {
        if (i === 0) return 0;
        return Math.max(0, prevHeights[i - 1]);
      }
      if (n === nPrev - 1 && i < n) {
        return Math.max(0, prevHeights[i + 1]);
      }
      return hv;
    };

    const renderStack = (stage, heights, prevHeights) => {
      const maxTopVhForStack = maxTopVh(heights);
      const layers = heights
        .map((h, i) => {
          const chronologicalIndex = heights.length - 1 - i;
          const { triangleColor, backgroundColor, textColor } =
            COLOR_COMBINATIONS[colorSetIndexForTriangle(chronologicalIndex)];
          const rightAngleLocation = rightAngleLocationForChronologicalIndex(chronologicalIndex);
          const hv = Math.max(0, h);
          const prevH = prevHeightForLayer(heights, prevHeights, i);
          const growing = hv >= prevH - 1e-9;
          const originClass = growing
            ? 'triangle-scale-wrap--origin-top'
            : 'triangle-scale-wrap--origin-bottom';
          const maxVh = maxTopVhForStack;
          const scale =
            maxVh > 1e-9 && hv > 1e-9 ? Math.min(1, hv / maxVh) : 0;
          const inner =
            hv < 1e-6
              ? ''
              : getTriangle({
                width: '100vw',
                height: `${maxVh}vh`,
                rightAngleLocation,
                color: triangleColor,
              });
          const line = scriptLineForTriangle(chronologicalIndex);
          const iw = window.innerWidth;
          const ih = window.innerHeight;
          const layerW = iw;
          const layerH = (hv / 100) * ih;
          const angleDeg = hypotenuseLabelAngleDeg(rightAngleLocation, layerW, layerH);
          const heightSpan = maxTopVhForStack - MIN_VH;
          let labelOpacity = 1;
          if (heightSpan > 1e-9) {
            const t = (hv - MIN_VH) / heightSpan;
            labelOpacity =
              t <= 0 ? 0 : t < LABEL_FADE_ZONE_FRAC ? t / LABEL_FADE_ZONE_FRAC : 1;
          } else {
            labelOpacity = hv > MIN_VH + 1e-9 ? 1 : 0;
          }
          /** Label is a sibling of the scaled wrap so it’s positioned in the hv-tall layer (hypotenuse tracks the visible triangle) and isn’t affected by scaleY (avoids skew from rotate × inverse scale). */
          const labelSpan =
            hv < 1e-6 || !line
              ? ''
              : `<span class="hypotenuse-label" style="color: ${textColor}; --hypo-angle: ${angleDeg}deg; opacity: ${labelOpacity}" aria-hidden="true">${escapeHtml(line)}</span>`;
          const scaleBlock =
            hv < 1e-6
              ? ''
              : `<div class="triangle-scale-wrap ${originClass}" style="height:${maxVh}vh; transform: scaleY(${scale})">${inner}</div>`;
          return `<div class="stack-layer" style="height:${hv}vh; background-color: ${backgroundColor}">${scaleBlock}${labelSpan}</div>`;
        })
        .join('');
      stage.innerHTML = `<div class="stack">${layers}</div>`;
    };

    const main = () => {
      const stage = document.getElementById('stage');
      const section = document.getElementById('triangles-section');

      const { keyframes } = buildScrollKeyframes();

      gsap.registerPlugin(ScrollTrigger);

      let prevHeights = null;
      let lastProgress = 0;
      renderStack(stage, keyframes[0].heights, prevHeights);

      const scrollTrigger = ScrollTrigger.create({
        trigger: section,
        start: 'top top',
        end: `+=${SCROLL_ANIMATION_DISTANCE_PX}`,
        pin: true,
        scrub: 1,
        anticipatePin: 1,
        onUpdate: (self) => {
          lastProgress = self.progress;
          const h = heightsAtProgress(keyframes, self.progress);
          renderStack(stage, h, prevHeights);
          prevHeights = h.slice();
        },
      });

      let holdRafId = null;
      let holdLastTs = null;
      let holdDelayTimer = null;
      let holdPressClientX = 0;
      let holdPressClientY = 0;
      let lastTapTs = 0;
      let lastTapX = 0;
      let lastTapY = 0;
      let doubleTapTween = null;
      /** Set on pointerdown: lower viewport half = forward, upper half = reverse. */
      let holdForward = true;

      const isLowerHalfViewport = (clientY) => clientY >= window.innerHeight * 0.5;

      /** Only ignore non-primary mouse buttons; touch/pen use varying `button` values on pointerup. */
      const isPrimaryPointerDown = (e) =>
        e.pointerType !== 'mouse' || e.button === 0;
      const isPrimaryPointerUp = (e) =>
        e.pointerType !== 'mouse' || e.button === 0;

      const stopHoldAdvance = () => {
        if (doubleTapTween) {
          doubleTapTween.kill();
          doubleTapTween = null;
        }
        if (holdDelayTimer != null) {
          clearTimeout(holdDelayTimer);
          holdDelayTimer = null;
        }
        if (holdRafId != null) {
          cancelAnimationFrame(holdRafId);
          holdRafId = null;
        }
        holdLastTs = null;
      };

      /** Snap document scroll to match progress (keeps ScrollTrigger in sync after hold or jump). */
      const scrollToProgress = (p) => {
        const clamped = Math.max(0, Math.min(1, p));
        const y = scrollTrigger.start + clamped * (scrollTrigger.end - scrollTrigger.start);
        window.scrollTo(0, y);
      };

      const applyProgress = (p) => {
        lastProgress = Math.max(0, Math.min(1, p));
        scrollToProgress(lastProgress);
        const h = heightsAtProgress(keyframes, lastProgress);
        renderStack(stage, h, prevHeights);
        prevHeights = h.slice();
      };

      /**
       * During hold we advance progress and render directly so scrub smoothing does not lag
       * behind rapid programmatic updates. Scroll is synced on release.
       */
      const tickHoldAdvance = (ts) => {
        if (holdRafId == null || AUTO_HOLD_PROGRESS_PER_SECOND <= 0) return;
        let dt = 0;
        if (holdLastTs != null) dt = (ts - holdLastTs) / 1000;
        holdLastTs = ts;
        const step = AUTO_HOLD_PROGRESS_PER_SECOND * dt;
        if (holdForward) {
          lastProgress = Math.min(1, lastProgress + step);
        } else {
          lastProgress = Math.max(0, lastProgress - step);
        }
        const h = heightsAtProgress(keyframes, lastProgress);
        renderStack(stage, h, prevHeights);
        prevHeights = h.slice();
        const atEnd = holdForward ? lastProgress >= 1 - 1e-6 : lastProgress <= 1e-6;
        if (!atEnd) {
          holdRafId = requestAnimationFrame(tickHoldAdvance);
        } else {
          holdRafId = null;
          holdLastTs = null;
          scrollToProgress(lastProgress);
        }
      };

      const startHoldAdvanceAfterDelay = () => {
        holdDelayTimer = null;
        if (AUTO_HOLD_PROGRESS_PER_SECOND <= 0) return;
        holdRafId = requestAnimationFrame(tickHoldAdvance);
      };

      const onHoldPointerDown = (e) => {
        if (AUTO_HOLD_PROGRESS_PER_SECOND <= 0) {
          return;
        }
        if (!isPrimaryPointerDown(e)) {
          return;
        }
        try {
          e.currentTarget.setPointerCapture(e.pointerId);
        } catch (_) {}
        stopHoldAdvance();
        holdForward = isLowerHalfViewport(e.clientY);
        holdPressClientX = e.clientX;
        holdPressClientY = e.clientY;
        holdDelayTimer = window.setTimeout(startHoldAdvanceAfterDelay, AUTO_HOLD_DELAY_MS);
      };

      const onHoldPointerMove = (e) => {
        if (holdDelayTimer == null) return;
        const dx = e.clientX - holdPressClientX;
        const dy = e.clientY - holdPressClientY;
        if (dx * dx + dy * dy > AUTO_HOLD_MOVE_CANCEL_PX * AUTO_HOLD_MOVE_CANCEL_PX) {
          stopHoldAdvance();
        }
      };

      const releaseSectionPointer = (e) => {
        try {
          if (e.currentTarget.hasPointerCapture(e.pointerId)) {
            e.currentTarget.releasePointerCapture(e.pointerId);
          }
        } catch (_) {}
      };

      const onHoldPointerEnd = (e) => {
        if (!isPrimaryPointerUp(e)) {
          return;
        }
        const now = performance.now();

        if (lastTapTs > 0) {
          const dt = now - lastTapTs;
          const dx = e.clientX - lastTapX;
          const dy = e.clientY - lastTapY;
          const distSq = dx * dx + dy * dy;
          const maxD = DOUBLE_TAP_MAX_DISTANCE_PX;
          const maxDistSq = maxD * maxD;
          const timeOk = dt <= DOUBLE_TAP_MAX_INTERVAL_MS;
          const distOk = distSq <= maxDistSq;
          if (timeOk && distOk) {
            releaseSectionPointer(e);
            stopHoldAdvance();
            lastTapTs = 0;
            const from = lastProgress;
            const forward = isLowerHalfViewport(e.clientY);
            const to = forward
              ? Math.min(1, from + DOUBLE_TAP_SKIP_FRAC)
              : Math.max(0, from - DOUBLE_TAP_SKIP_FRAC);

            if (Math.abs(to - from) < 1e-9) {
              applyProgress(from);
              return;
            }
            const state = { p: from };
            doubleTapTween = gsap.to(state, {
              p: to,
              duration: DOUBLE_TAP_ANIM_DURATION_SEC,
              ease: 'power2.out',
              onUpdate: () => {
                lastProgress = state.p;
                scrollToProgress(lastProgress);
                const h = heightsAtProgress(keyframes, lastProgress);
                renderStack(stage, h, prevHeights);
                prevHeights = h.slice();
              },
              onComplete: () => {
                doubleTapTween = null;
                applyProgress(to);
              },
            });
            return;
          }
        }

        releaseSectionPointer(e);
        const wasAdvancing = holdRafId != null;
        stopHoldAdvance();
        if (wasAdvancing) {
          applyProgress(lastProgress);
        }

        lastTapTs = now;
        lastTapX = e.clientX;
        lastTapY = e.clientY;
      };

      /**
       * True cancellation (e.g. touch scroll takeover). Do not use for `lostpointercapture`:
       * that event also fires after we call `releasePointerCapture` in pointerup; handling it
       * would run `stopHoldAdvance()` again and kill the double-tap gsap tween immediately.
       */
      const onHoldPointerCancel = (e) => {
        tapLog(e.type, {
          pointerId: e.pointerId,
          pointerType: e.pointerType,
          button: e.button,
          lastTapTsBefore: lastTapTs,
        });
        releaseSectionPointer(e);
        const wasAdvancing = holdRafId != null;
        stopHoldAdvance();
        if (wasAdvancing) {
          applyProgress(lastProgress);
        }
      };

      section.addEventListener('selectstart', (e) => e.preventDefault());
      section.addEventListener('dragstart', (e) => e.preventDefault());
      section.addEventListener('contextmenu', (e) => e.preventDefault());
      section.addEventListener('pointerdown', onHoldPointerDown);
      section.addEventListener('pointermove', onHoldPointerMove);
      section.addEventListener('pointerup', onHoldPointerEnd);
      section.addEventListener('pointercancel', onHoldPointerCancel);

      window.addEventListener('resize', () => {
        if (doubleTapTween) {
          doubleTapTween.kill();
          doubleTapTween = null;
        }
        refreshKeyframeLabelAngles(keyframes);
        const h = heightsAtProgress(keyframes, lastProgress);
        renderStack(stage, h, prevHeights);
        ScrollTrigger.refresh();
      });

      ScrollTrigger.refresh();
    };

    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>

</html>
