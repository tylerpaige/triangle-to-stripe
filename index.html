<!doctype html>
<html>

<head>
  <style>
    html,
    body {
      margin: 0;
      overflow-x: hidden;
      background-color: #111;
    }
    .stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
      height: 100vh;
      flex-shrink: 0;
    }
    .stack-layer {
      flex-shrink: 0;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    .hypotenuse-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(var(--hypo-angle, 0deg));
      transform-origin: center center;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
    }
    .triangles-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <section class="triangles-section" id="triangles-section">
    <div id="stage" class="stage"></div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script type="text/javascript">
    /*
    *******************
    ** CONFIGURATION **
    *******************
    */
    /** triangleColor: triangle fill, backgroundColor: strip background, textColor: hypotenuse label */
    const COLOR_COMBINATIONS = [
      { triangleColor: 'tomato', backgroundColor: 'skyblue', textColor: 'midnightblue' },
      { triangleColor: 'burlywood', backgroundColor: 'yellowgreen', textColor: 'saddlebrown' },
      { triangleColor: 'orange', backgroundColor: 'cornflowerblue', textColor: 'ivory' },
    ];
    /** How many consecutive triangles (in chronological order, oldest first) share one
     * color set before advancing to the next in COLOR_COMBINATIONS. Use 2 for every
     * other triangle switching sets, 3 for every third, etc. */
    const COLOR_SET_TRIANGLE_CADENCE = 2;
    /** Minimum height of a triangle in vh, as they shrink down to make room for others */
    const MIN_VH = 0.5;
    /** vh grown per millisecond of virtual time (used only to build the scroll timeline) */
    const VH_PER_MS = 100 / 100;
    /** Max keyframes for scroll scrub (higher = smoother, more build time). */
    const SCROLL_KEYFRAME_CAP = 4000;
    /** Pixels of scroll while the triangles section is pinned (animation maps 0→1). */
    const SCROLL_ANIMATION_DISTANCE_PX = 4500;
    /**
     * Lines shown along each triangle’s hypotenuse, in chronological order (oldest
     * triangle first). If there are fewer entries than triangles, the list repeats.
     */
    const SCRIPT = [
      'First light',
      'Second wave',
      'Third breath',
      'Fourth fold',
    ];

    /*
    ***************
    ** CONSTANTS **
    ***************
    */
    const VALID_RIGHT_ANGLE_LOCATIONS = ['top-right', 'top-left', 'bottom-right', 'bottom-left'];
    const TRIANGLE_TARGET = 100 / MIN_VH;

    /*
    ***************
    ** FUNCTIONS **
    ***************
    */

    const getTriangle = ({ width, height, rightAngleLocation = 'top-right', color = 'black' }) => {
      if (!VALID_RIGHT_ANGLE_LOCATIONS.includes(rightAngleLocation)) {
        throw new Error(`Invalid right angle location: ${rightAngleLocation}`);
      }

      switch (rightAngleLocation) {
        case 'top-right':
          return `<div data-right-angle-location="top-right" style="border-top: 0 solid transparent; border-bottom: ${height} solid transparent; border-right: ${width} solid ${color};"></div>`;
        case 'top-left':
          return `<div data-right-angle-location="top-left" style="border-top: 0 solid transparent; border-bottom: ${height} solid transparent; border-left: ${width} solid ${color};"></div>`;
        case 'bottom-right':
          return `<div data-right-angle-location="bottom-right" style="border-top: ${height} solid transparent; border-bottom: 0 solid transparent; border-right: ${width} solid ${color};"></div>`;
        case 'bottom-left':
          return `<div data-right-angle-location="bottom-left" style="border-top: ${height} solid transparent; border-bottom: 0 solid transparent; border-left: ${width} solid ${color};"></div>`;
        default:
          throw new Error(`Invalid right angle location: ${rightAngleLocation}`);
      }
    }

    /**
     * Heights in vh, top-first: index 0 is the newest / growing triangle.
     * Sum is always 100. Each layer below the top may shrink down to MIN_VH, so the
     * top can grow at most 100 - (n-1)*MIN_VH when n >= 2.
     */
    const maxTopVh = (heights) => {
      const n = heights.length;
      if (n <= 1) return 100;
      return 100 - (n - 1) * MIN_VH;
    };

    const growTop = (heights, dh) => {
      if (heights.length <= 1 || dh <= 0) return heights;
      const out = heights.slice();
      let remaining = dh;
      out[0] += dh;
      for (let i = out.length - 1; i >= 1 && remaining > 1e-9; i--) {
        const take = Math.min(remaining, Math.max(0, out[i] - MIN_VH));
        out[i] -= take;
        remaining -= take;
      }
      if (remaining > 1e-9) {
        out[0] -= remaining;
      }
      return out;
    };

    const maybeAddTriangle = (heights) => {
      if (heights.length >= TRIANGLE_TARGET) return heights;
      const cap = maxTopVh(heights);
      if (heights[0] < cap - 1e-6) return heights;
      return [0, ...heights];
    };

    /**
     * One virtual-time step (same rules as the former rAF loop).
     * @param {number[]} heights
     * @param {number} dt ms
     */
    const stepHeights = (heights, dt) => {
      if (heights.length === 1) {
        let h = [Math.min(100, heights[0] + VH_PER_MS * dt)];
        if (h[0] >= 100 - 1e-6) {
          h = maybeAddTriangle(h);
        }
        return h;
      }
      let h = heights;
      const cap = maxTopVh(h);
      const room = cap - h[0];
      if (room > 1e-9) {
        const step = Math.min(room, VH_PER_MS * dt);
        h = growTop(h, step);
      }
      if (h[0] >= maxTopVh(h) - 1e-6 && h.length < TRIANGLE_TARGET) {
        h = maybeAddTriangle(h);
      }
      return h;
    };

    const simulationComplete = (heights) => {
      const cap = maxTopVh(heights);
      return (
        heights.length >= TRIANGLE_TARGET &&
        heights[0] >= cap - 1e-3 &&
        heights.slice(1).every((x) => Math.abs(x - MIN_VH) < 1e-2)
      );
    };

    /**
     * Run the full simulation with fixed dt; return total virtual ms and subsampled keyframes.
     */
    const buildScrollKeyframes = () => {
      const dt = 1;
      let h = [0];
      let t = 0;
      let guard = 0;
      const maxGuard = 50_000_000;
      while (!simulationComplete(h) && guard < maxGuard) {
        h = stepHeights(h, dt);
        t += dt;
        guard++;
      }
      const totalVirtualMs = t;

      const interval = Math.max(dt, totalVirtualMs / SCROLL_KEYFRAME_CAP);
      h = [0];
      t = 0;
      const keyframes = [{ t: 0, heights: [0] }];
      let nextSample = interval;
      guard = 0;
      while (!simulationComplete(h) && guard < maxGuard) {
        h = stepHeights(h, dt);
        t += dt;
        guard++;
        if (t >= nextSample - 1e-9) {
          keyframes.push({ t, heights: h.slice() });
          nextSample += interval;
        }
      }
      const last = keyframes[keyframes.length - 1];
      if (!last || last.t < totalVirtualMs - 1e-6 || last.heights.length !== h.length) {
        keyframes.push({ t: totalVirtualMs, heights: h.slice() });
      }

      return { keyframes, totalVirtualMs };
    };

    const heightsAtProgress = (keyframes, p) => {
      if (keyframes.length === 0) return [0];
      const clamped = Math.max(0, Math.min(1, p));
      const idx = Math.round(clamped * (keyframes.length - 1));
      return keyframes[idx].heights.slice();
    };

    const colorSetIndexForTriangle = (chronologicalIndex) =>
      Math.floor(chronologicalIndex / COLOR_SET_TRIANGLE_CADENCE) % COLOR_COMBINATIONS.length;

    const escapeHtml = (s) =>
      String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    /**
     * Degrees to rotate a horizontal baseline so it matches the hypotenuse through
     * the layer center. Directions match the former SVG paths (viewBox y-down):
     * top-right M 0,1 → 1,0 · bottom-right M 0,0 → 1,1 · top-left M 1,0 → 0,1 · bottom-left M 1,1 → 0,0
     */
    const hypotenuseLabelAngleDeg = (rightAngleLocation, W, H) => {
      const toDeg = (r) => (r * 180) / Math.PI;
      switch (rightAngleLocation) {
        case 'top-right':
          return toDeg(Math.atan2(-H, W));
        case 'bottom-right':
          return toDeg(Math.atan2(H, W));
        case 'top-left':
          return toDeg(Math.atan2(-H, W));
        case 'bottom-left':
          return toDeg(Math.atan2(H, W));
        default:
          return 0;
      }
    };

    const scriptLineForTriangle = (chronologicalIndex) => {
      if (!SCRIPT.length) return '';
      return SCRIPT[chronologicalIndex % SCRIPT.length];
    };

    const renderStack = (stage, heights) => {
      const maxTopVhForStack = maxTopVh(heights);
      const layers = heights
        .map((h, i) => {
          const chronologicalIndex = heights.length - 1 - i;
          const { triangleColor, backgroundColor, textColor } =
            COLOR_COMBINATIONS[colorSetIndexForTriangle(chronologicalIndex)];
          let rightAngleLocation;
          switch (chronologicalIndex % 4) {
            case 0:
              rightAngleLocation = 'top-right';
              break;
            case 1:
              rightAngleLocation = 'bottom-right';
              break;
            case 2:
              rightAngleLocation = 'top-left';
              break;
            case 3:
              rightAngleLocation = 'bottom-left';
              break;
          }
          const hv = Math.max(0, h);
          const inner =
            hv < 1e-6
              ? ''
              : getTriangle({
                  width: '100vw',
                  height: `${hv}vh`,
                  rightAngleLocation,
                  color: triangleColor,
                });
          const line = scriptLineForTriangle(chronologicalIndex);
          const iw = window.innerWidth;
          const ih = window.innerHeight;
          const layerW = iw;
          const layerH = (hv / 100) * ih;
          const baseAngleDeg = hypotenuseLabelAngleDeg(rightAngleLocation, layerW, layerH);
          /**
           * Same 4-cycle as `rightAngleLocation`: ≡0 (mod 4) +90° CW, ≡1 −90° CCW, ≡2,3 no nudge.
           * Positions 2–3 use hypotenuse-only atan2; blended nudge on those corners read wrong when thin.
           */
          const mod4 = chronologicalIndex % 4;
          const cycleNudgeDeg =
            mod4 === 0 ? 90 : mod4 === 1 ? -90 : 0;
          /** Fade nudge out toward MIN_VH: full only when the strip is tall; thin strips use hypotenuse angle only. */
          const nudgeBlend =
            maxTopVhForStack <= MIN_VH + 1e-9
              ? 0
              : Math.max(0, Math.min(1, (hv - MIN_VH) / (maxTopVhForStack - MIN_VH)));
          const angleDeg = baseAngleDeg + cycleNudgeDeg * nudgeBlend;
          const labelSpan =
            hv < 1e-6 || !line
              ? ''
              : `<span class="hypotenuse-label" style="color: ${textColor}; --hypo-angle: ${angleDeg}deg" aria-hidden="true">${escapeHtml(line)}</span>`;
          return `<div class="stack-layer" style="height:${hv}vh; background-color: ${backgroundColor}">${inner}${labelSpan}</div>`;
        })
        .join('');
      stage.innerHTML = `<div class="stack">${layers}</div>`;
    };

    const main = () => {
      const stage = document.getElementById('stage');
      const section = document.getElementById('triangles-section');

      const { keyframes } = buildScrollKeyframes();

      gsap.registerPlugin(ScrollTrigger);

      renderStack(stage, keyframes[0].heights);

      ScrollTrigger.create({
        trigger: section,
        start: 'top top',
        end: `+=${SCROLL_ANIMATION_DISTANCE_PX}`,
        pin: true,
        scrub: 1,
        anticipatePin: 1,
        onUpdate: (self) => {
          const h = heightsAtProgress(keyframes, self.progress);
          renderStack(stage, h);
        },
      });

      ScrollTrigger.refresh();
    };

    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>

</html>
